<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>播放列表管理 - 自定义播放列表</title>
    <link rel="stylesheet" href="page.css" />
    <script src="playlist-data.js" defer></script>
    <script src="manage.js" defer></script>
  </head>
  <body>
    <header class="page-header">
      <div class="page-header__inner">
        <div class="brand"><span class="brand__icon">▶</span>自定义播放列表</div>
      </div>
    </header>
    <main class="page-main">
      <div class="page-title-row">
        <div>
          <h1 class="page-title">播放列表管理</h1>
          <p class="page-description">新建播放列表、编辑视频标题或整理列表内容。</p>
        </div>
        <form id="create-playlist-form" class="create-playlist-form">
          <label class="visually-hidden" for="new-playlist-name">新播放列表名称</label>
          <input
            id="new-playlist-name"
            class="create-playlist-form__input"
            type="text"
            maxlength="80"
            placeholder="输入新播放列表名称"
            required
          />
          <button class="primary-button primary-button--form" type="submit">新建播放列表</button>
        </form>
      </div>
      <p id="manage-message" class="page-message" role="status" aria-live="polite"></p>
      <div id="manage-playlists" class="playlist-grid" aria-live="polite"></div>
    </main>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>B站歌单模式</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <span class="popup__logo">▶</span>
        <div>
          <h1>B站歌单模式</h1>
          <p>请选择要进入的功能</p>
        </div>
      </header>

      <nav class="popup__actions" aria-label="插件功能">
        <a class="action-card" href="manage.html" target="_blank">
          <span class="action-card__icon action-card__icon--manage">≡</span>
          <span class="action-card__content">
            <strong>歌单管理</strong>
            <small>新建、编辑和整理歌单</small>
          </span>
          <span class="action-card__arrow">›</span>
        </a>

        <a class="action-card" href="select.html" target="_blank">
          <span class="action-card__icon action-card__icon--select">♪</span>
          <span class="action-card__content">
            <strong>歌单选择</strong>
            <small>选择一个歌单开始播放</small>
          </span>
          <span class="action-card__arrow">›</span>
        </a>
      </nav>
    </main>
  </body>
</html>

<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playlist for Bilibili / 自定义B站播放列表 (Chrome Extension)</title>
    <link rel="stylesheet" href="popup.css" />
    <script src="playlist-data.js" defer></script>
    <script src="popup.js" defer></script>
  </head>
  <body>
    <main class="popup">
      <header class="popup__header">
        <span class="popup__logo">▶</span>
        <div>
          <h1>Playlist for Bilibili / 自定义B站播放列表</h1>
          <p>请选择要进入的功能</p>
        </div>
      </header>

      <nav class="popup__actions" aria-label="插件功能">
        <button
          id="add-current-video"
          class="action-card action-card--button"
          type="button"
          aria-expanded="false"
          aria-controls="playlist-picker"
        >
          <span class="action-card__icon action-card__icon--add">＋</span>
          <span class="action-card__content">
            <strong>将本视频添加到播放列表</strong>
            <small id="add-current-video-description">正在读取当前视频…</small>
          </span>
          <span class="action-card__arrow">›</span>
        </button>

        <aside id="playlist-picker" class="popup__playlist-picker" hidden>
          <div class="popup__picker-header">
            <div>
              <strong>选择播放列表</strong>
              <small>点击后立即添加</small>
            </div>
            <button id="close-playlist-picker" class="popup__picker-close" type="button" aria-label="关闭播放列表选择">
              ×
            </button>
          </div>
          <div id="playlist-picker-list" class="popup__picker-list"></div>
        </aside>

        <a class="action-card" href="manage.html" target="_blank">
          <span class="action-card__icon action-card__icon--manage">≡</span>
          <span class="action-card__content">
            <strong>播放列表管理</strong>
            <small>新建、编辑和整理播放列表</small>
          </span>
          <span class="action-card__arrow">›</span>
        </a>

        <a class="action-card" href="select.html" target="_blank">
          <span class="action-card__icon action-card__icon--select">♪</span>
          <span class="action-card__content">
            <strong>选择播放列表</strong>
            <small>选择一个播放列表开始播放</small>
          </span>
          <span class="action-card__arrow">›</span>
        </a>
      </nav>
      <p id="popup-message" class="popup__message" role="status" aria-live="polite"></p>
    </main>
  </body>
</html>

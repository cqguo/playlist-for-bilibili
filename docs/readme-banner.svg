<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Playlist for Bilibili</title>
  <desc id="desc">A colorful banner showing a custom playlist beside a video player.</desc>
  <defs>
    <linearGradient id="background" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e8f8ff"/>
      <stop offset="0.52" stop-color="#f7fbff"/>
      <stop offset="1" stop-color="#fff0f5"/>
    </linearGradient>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#00aeec"/>
      <stop offset="1" stop-color="#fb7299"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#263445"/>
      <stop offset="1" stop-color="#111820"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#48677a" flood-opacity=".16"/>
    </filter>
    <pattern id="dots" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="2" fill="#00aeec" opacity=".1"/>
    </pattern>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#background)"/>
  <rect width="1200" height="420" rx="28" fill="url(#dots)"/>
  <circle cx="1085" cy="55" r="130" fill="#fb7299" opacity=".08"/>
  <circle cx="80" cy="410" r="180" fill="#00aeec" opacity=".07"/>

  <g transform="translate(72 80)">
    <rect width="58" height="58" rx="16" fill="url(#brand)" filter="url(#shadow)"/>
    <path d="M25 20.5 41 29 25 37.5Z" fill="#fff"/>
    <text x="0" y="98" fill="#18191c" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="38" font-weight="750">Playlist for Bilibili</text>
    <text x="0" y="136" fill="#61666d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="20">Your videos. Your order. Your playlist.</text>
    <g transform="translate(0 174)">
      <rect width="126" height="36" rx="18" fill="#00aeec"/>
      <text x="63" y="23" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="650">MULTI-PLAYLIST</text>
      <rect x="136" width="108" height="36" rx="18" fill="#fff" stroke="#e3e5e7"/>
      <text x="190" y="23" text-anchor="middle" fill="#61666d" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="13" font-weight="650">AUTO PLAY</text>
    </g>
  </g>

  <g transform="translate(566 58)" filter="url(#shadow)">
    <rect width="562" height="304" rx="20" fill="#fff"/>
    <rect width="562" height="38" rx="20" fill="#f7f8fa"/>
    <rect y="20" width="562" height="18" fill="#f7f8fa"/>
    <circle cx="22" cy="19" r="5" fill="#fb7299"/>
    <circle cx="40" cy="19" r="5" fill="#ffb44a"/>
    <circle cx="58" cy="19" r="5" fill="#43c88f"/>

    <rect x="18" y="56" width="328" height="230" rx="12" fill="url(#screen)"/>
    <circle cx="182" cy="161" r="34" fill="#fff" opacity=".14"/>
    <path d="M174 145 198 161 174 177Z" fill="#fff"/>
    <rect x="34" y="262" width="296" height="4" rx="2" fill="#fff" opacity=".18"/>
    <rect x="34" y="262" width="174" height="4" rx="2" fill="url(#brand)"/>

    <g transform="translate(362 56)">
      <text x="0" y="16" fill="#18191c" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="14" font-weight="700">MY PLAYLIST</text>
      <text x="160" y="16" text-anchor="end" fill="#9499a0" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11">2 / 4</text>

      <g transform="translate(0 34)">
        <rect width="182" height="48" rx="9" fill="#e5f7fd"/>
        <rect x="10" y="10" width="28" height="28" rx="7" fill="#00aeec"/>
        <path d="M21 17 31 24 21 31Z" fill="#fff"/>
        <rect x="48" y="12" width="108" height="7" rx="3.5" fill="#18191c" opacity=".78"/>
        <rect x="48" y="28" width="72" height="5" rx="2.5" fill="#00aeec" opacity=".55"/>
      </g>

      <g transform="translate(0 90)">
        <rect width="182" height="48" rx="9" fill="#f7f8fa"/>
        <rect x="10" y="10" width="28" height="28" rx="7" fill="#fff0f4"/>
        <text x="24" y="29" text-anchor="middle" fill="#fb7299" font-family="sans-serif" font-size="11" font-weight="700">02</text>
        <rect x="48" y="12" width="96" height="7" rx="3.5" fill="#18191c" opacity=".62"/>
        <rect x="48" y="28" width="62" height="5" rx="2.5" fill="#9499a0" opacity=".42"/>
      </g>

      <g transform="translate(0 146)">
        <rect width="182" height="48" rx="9" fill="#f7f8fa"/>
        <rect x="10" y="10" width="28" height="28" rx="7" fill="#e5f7fd"/>
        <text x="24" y="29" text-anchor="middle" fill="#00aeec" font-family="sans-serif" font-size="11" font-weight="700">03</text>
        <rect x="48" y="12" width="112" height="7" rx="3.5" fill="#18191c" opacity=".62"/>
        <rect x="48" y="28" width="78" height="5" rx="2.5" fill="#9499a0" opacity=".42"/>
      </g>

      <g transform="translate(0 202)">
        <rect width="182" height="28" rx="8" fill="url(#brand)" opacity=".92"/>
        <text x="91" y="19" text-anchor="middle" fill="#fff" font-family="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif" font-size="11" font-weight="700">LOOP PLAYLIST</text>
      </g>
    </g>
  </g>
</svg>
